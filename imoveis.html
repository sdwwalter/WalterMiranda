<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Imóveis disponíveis com Walter Miranda — Corretor em Londrina e região.">
  <title>Imóveis Disponíveis – Walter Miranda</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HAMBURGER ===== -->
  <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- ===== NAV OVERLAY ===== -->
  <nav class="nav-overlay" id="nav-overlay" aria-label="Navegação principal">
    <a href="index.html"><i class="fas fa-home"></i> Início</a>
    <div class="nav-divider"></div>
    <a href="imoveis.html"><i class="fas fa-building"></i> Imóveis</a>
    <a href="mentoria.html"><i class="fas fa-fire"></i> Mentoria</a>
    <div class="nav-divider"></div>
    <a href="https://wa.me/5543988616329" target="_blank" rel="noopener"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    <a href="https://instagram.com/chavecerta.ldn" target="_blank" rel="noopener"><i class="fab fa-instagram"></i> Instagram</a>
  </nav>

  <!-- ===== PAGE CONTENT ===== -->
  <div class="card-container">

    <h1 class="mentoria-title">
      <i class="fas fa-building" style="color:var(--gold);font-size:0.75em;margin-right:10px"></i>
      Imóveis Disponíveis
    </h1>
    <p class="mentoria-description">
      Confira as melhores oportunidades disponíveis agora.<br>
      Filtre por cidade, número de quartos e faixa de preço.
    </p>

    <!-- Filters -->
    <section class="filters" aria-label="Filtrar imóveis">
      <select id="filter-city" aria-label="Filtrar por cidade">
        <option value="">📍 Todas as cidades</option>
      </select>

      <select id="filter-bedrooms" aria-label="Filtrar por quartos">
        <option value="">🛏 Qualquer número de quartos</option>
        <option value="1">1 quarto</option>
        <option value="2">2 quartos</option>
        <option value="3">3 quartos</option>
        <option value="4">4+ quartos</option>
      </select>

      <select id="filter-price" aria-label="Filtrar por preço">
        <option value="">💰 Qualquer faixa de preço</option>
        <option value="0-200000">Até R$200.000</option>
        <option value="200001-350000">R$200.001 a R$350.000</option>
        <option value="350001-600000">R$350.001 a R$600.000</option>
        <option value="600001-9999999">Acima de R$600.000</option>
      </select>

      <button id="btn-reset" aria-label="Limpar filtros">
        <i class="fas fa-rotate-left"></i> Limpar filtros
      </button>
    </section>

    <!-- Property Grid (populated by JS) -->
    <section id="properties" class="property-grid" aria-live="polite" aria-label="Lista de imóveis"></section>

    <a href="index.html" class="link-button-back">
      <i class="fas fa-arrow-left"></i> Voltar à Página Principal
    </a>

    <!-- Modal -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Detalhes do imóvel">
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Fechar detalhes">
          <i class="fas fa-times"></i>
        </button>
        <div id="modal-body"></div>
      </div>
    </div>

  </div><!-- /card-container -->

  <script src="script.js"></script>
</body>
</html>
